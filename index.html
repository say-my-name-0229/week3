<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React.js Lab – Experiment 3</title>
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #61dafb;
      --accent-hover: #38bdf8;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    header {
      text-align: center;
      max-width: 900px;
      margin: 0 auto 2rem auto;
    }

    header h1 {
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
    }

    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .nav-btn {
      background-color: var(--card-bg);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .nav-btn:hover, .nav-btn.active {
      background-color: var(--accent);
      color: #000;
      transform: translateY(-2px);
    }

    main {
      max-width: 800px;
      margin: 2rem auto;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      min-height: 350px;
    }

    .demo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    /* Embedded Component Styling */
    .counter-btn {
      background-color: var(--accent);
      border: none;
      padding: 0.5rem 1.5rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .data-list, .form-box {
      width: 100%;
      max-width: 500px;
      background: var(--bg-color);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    input[type="text"] {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 4px;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚛️ React.js Lab – Experiment 3</h1>
    <p>Select any experiment below to render and run its interactive output live.</p>
    
    <div class="nav-buttons">
      <button class="nav-btn active" onclick="switchTab('3a')">Program 3(a)</button>
      <button class="nav-btn" onclick="switchTab('3b')">Program 3(b)</button>
      <button class="nav-btn" onclick="switchTab('3c')">Program 3(c)</button>
      <button class="nav-btn" onclick="switchTab('3d')">Program 3(d)</button>
      <button class="nav-btn" onclick="switchTab('3e')">Program 3(e)</button>
    </div>
  </header>

  <main id="root"></main>

  <footer>
    <p>© Jagadesh R — React.js Laboratory Work</p>
  </footer>

  <!-- React JSX Code Execution -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 3(a) Counter Application
    function Program3A() {
      const [count, setCount] = useState(0);
      return (
        <div className="demo-container">
          <h2>Program 3(a) – Counter App (useState)</h2>
          <p style={{fontSize: '2rem', fontWeight: 'bold'}}>{count}</p>
          <div style={{display: 'flex', gap: '0.5rem'}}>
            <button className="counter-btn" onClick={() => setCount(count + 1)}>Increment</button>
            <button className="counter-btn" style={{background: '#ef4444', color: '#fff'}} onClick={() => setCount(0)}>Reset</button>
          </div>
        </div>
      );
    }

    // 3(b) Fetch API
    function Program3B() {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetch('https://jsonplaceholder.typicode.com/users?_limit=3')
          .then(res => res.json())
          .then(data => {
            setUsers(data);
            setLoading(false);
          });
      }, []);

      return (
        <div className="demo-container">
          <h2>Program 3(b) – API Fetch (useEffect)</h2>
          {loading ? <p>Loading API Data...</p> : (
            <div className="data-list">
              {users.map(u => (
                <div key={u.id} style={{marginBottom: '0.5rem', borderBottom: '1px solid #334155', paddingBottom: '0.5rem'}}>
                  <strong>{u.name}</strong> – {u.email}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // 3(c) Props & Data Sharing
    function UserCard({ name, role }) {
      return (
        <div style={{padding: '0.75rem', background: '#1e293b', border: '1px solid #334155', borderRadius: '6px', width: '100%'}}>
          <h3>{name}</h3>
          <p style={{color: '#61dafb'}}>{role}</p>
        </div>
      );
    }

    function Program3C() {
      return (
        <div className="demo-container">
          <h2>Program 3(c) – Props & Data Sharing</h2>
          <div className="data-list" style={{display: 'flex', flexDirection: 'column', gap: '0.5rem'}}>
            <UserCard name="Jagadesh R" role="AI & Web Developer" />
            <UserCard name="React Component" role="Child Receiver via Props" />
          </div>
        </div>
      );
    }

    // 3(d) React Forms
    function Program3D() {
      const [text, setText] = useState('');

      return (
        <div className="demo-container">
          <h2>Program 3(d) – React Controlled Form</h2>
          <div className="form-box">
            <label>Type Something:</label>
            <input type="text" value={text} onChange={(e) => setText(e.target.value)} placeholder="Type here..." />
            <p style={{marginTop: '1rem'}}>Live State Output: <span style={{color: '#61dafb'}}>{text || 'None'}</span></p>
          </div>
        </div>
      );
    }

    // 3(e) Map Rendering
    function Program3E() {
      const items = ['React.js', 'JavaScript ES6', 'Functional Components', 'Hooks State Management'];

      return (
        <div className="demo-container">
          <h2>Program 3(e) – Iterative Map Rendering</h2>
          <div className="data-list">
            <ul>
              {items.map((item, index) => (
                <li key={index} style={{margin: '0.5rem 0 0.5rem 1.5rem', color: '#61dafb'}}>{item}</li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    // Main App Controller
    function App() {
      const [activeTab, setActiveTab] = useState('3a');

      window.switchTab = (tab) => {
        setActiveTab(tab);
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
      };

      switch (activeTab) {
        case '3a': return <Program3A />;
        case '3b': return <Program3B />;
        case '3c': return <Program3C />;
        case '3d': return <Program3D />;
        case '3e': return <Program3E />;
        default: return <Program3A />;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
